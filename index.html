<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <meta name="description" content="루핏의 개인정보 처리방침, 이용약관 및 고객지원 안내" />
    <title>루핏 법률 및 고객지원</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f7f4;
        --fg: #171719;
        --muted: #66666d;
        --line: #deded8;
        --card: #ffffff;
        --accent: #bdf453;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #09090a;
          --fg: #f4f4f0;
          --muted: #aaaab2;
          --line: #2a2a2e;
          --card: #151517;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        line-height: 1.65;
        word-break: keep-all;
      }
      main { max-width: 860px; margin: 0 auto; padding: 72px 22px; }
      .eyebrow { margin: 0 0 10px; color: var(--muted); font-size: 14px; font-weight: 700; }
      h1 { margin: 0; font-size: clamp(38px, 9vw, 68px); line-height: 1.05; letter-spacing: -0.04em; }
      .intro { max-width: 620px; margin: 22px 0 42px; color: var(--muted); font-size: 18px; }
      .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
      .card {
        min-height: 180px;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: var(--card);
        color: inherit;
        text-decoration: none;
        transition: transform 160ms ease, border-color 160ms ease;
      }
      .card:hover { transform: translateY(-3px); border-color: var(--accent); }
      .card strong { display: block; margin-bottom: 10px; font-size: 20px; }
      .card span { color: var(--muted); font-size: 15px; }
      footer { margin-top: 44px; color: var(--muted); font-size: 14px; }
      footer a { color: inherit; }
      @media (max-width: 680px) { .grid { grid-template-columns: 1fr; } .card { min-height: 140px; } }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">PHYSIQUEHUB</p>
      <h1>루핏</h1>
      <p class="intro">
        내 루틴대로 운동을 가볍게 기록하는 루핏의 법률 문서와 고객지원 안내입니다.
      </p>
      <section class="grid" aria-label="루핏 문서">
        <a class="card" href="./privacy/">
          <strong>개인정보 처리방침</strong>
          <span>루핏이 데이터와 개인정보를 처리하는 방식을 확인합니다.</span>
        </a>
        <a class="card" href="./terms/">
          <strong>이용약관</strong>
          <span>서비스 이용 조건과 운영자 및 이용자의 권리·의무를 확인합니다.</span>
        </a>
        <a class="card" href="./support/">
          <strong>고객지원</strong>
          <span>서비스 문의와 의견을 피지크허브에 전달합니다.</span>
        </a>
      </section>
      <footer>
        문의: <a href="mailto:support@physiquehub.kr">support@physiquehub.kr</a>
      </footer>
    </main>
  </body>
</html>
